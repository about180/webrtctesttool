<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebRTC 網路測試工具 · iperf on the web</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="root"></div>

    <!-- Vendored locally (public/vendor/) — no CDN, works fully offline. -->
    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>
    <script src="vendor/babel.min.js"></script>
    <!-- Babel standalone transforms app.jsx in the browser at load time: no
         build step, matching this project's zero-build / offline design.
         Bootstrapped manually (rather than the "text/babel" auto-scan) so we
         can pin the classic JSX runtime — Babel's default "automatic" runtime
         emits an ES `import` of react/jsx-runtime, which a plain <script> (no
         module loader) can't execute. -->
    <script>
      fetch('app.jsx')
        .then((r) => r.text())
        .then((src) => {
          const { code } = Babel.transform(src, {
            presets: [['react', { runtime: 'classic' }]],
            filename: 'app.jsx',
          });
          const script = document.createElement('script');
          script.textContent = code;
          document.body.appendChild(script);
        })
        .catch((e) => {
          console.error(e);
          document.body.innerHTML = '<pre style="color:#f2555a;padding:20px">App failed to load: ' + e.message + '</pre>';
        });
    </script>
  </body>
</html>
